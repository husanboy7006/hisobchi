name: Deploy to Production Pipeline

on:
  push:
    branches:
      - production

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hisobchi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install Dependencies
      run: |
        cd backend && npm ci
        cd ../frontend && npm ci

    # You could add your actual 'npm run test' or 'npm run lint' lines here 
    # Example:
    # - name: Run Linter
    #   run: cd backend && npm run lint

    - name: Build Frontend
      run: cd frontend && npm run build

    - name: Deploy to VPS or Render
      # This is a sample step. Typically handled by Render automatically via auto-deploy on main branch, 
      # or via SSH agent if deploying to an Ubuntu VPS.
      env:
        DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      run: |
        echo "Building success. Triggering deploy..."
        # If Render is used:
        # curl -X POST $DEPLOY_HOOK
        
        # If VPS used via SSH, run a script to pull and restart.
