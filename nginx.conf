server {
    listen 80;
    server_name hisobchi.uz www.hisobchi.uz;

    # Certbot uchun challenge papkasi (SSL olish paytida kerak)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Barcha HTTP so'rovlarni HTTPS ga majburiy burish
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name hisobchi.uz www.hisobchi.uz;

    # SSL sertifikat yo'llari (Certbot o'zi yaratadi)
    ssl_certificate /etc/letsencrypt/live/hisobchi.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hisobchi.uz/privkey.pem;

    # SSL xavfsizlik parametrlari
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Katta payloadlarni ruxsat etish (Dashboard yoki rasmlar uchun)
    client_max_body_size 10M;

    # Backend API (5000 port)
    location /api/ {
        proxy_pass http://localhost:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (Next.js - 3000 port)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Statik fayllarni bevosita Nginx orqali uzatish (optimallashtirish)
    location /_next/static/ {
        # Agar docker ichida bo'lmasa, shunday qilsa bo'ladi.
        # Lekin Docker ichida port 3000 orqali o'tishi sababli, 
        # odatda yuqoridagi "location /" o'zi eplaydi.
        proxy_pass http://localhost:3000/_next/static/;
        proxy_cache_valid 200 365d;
        expires 365d;
        access_log off;
    }
}
